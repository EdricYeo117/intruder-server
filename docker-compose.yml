services:
  api:
    build: .
    container_name: intruder-api
    ports:
      - "8080:8080"
    environment:
      # Existing
      - RTMP_INGEST_BASE=rtmp://192.168.1.49:1935/live
      - STREAM_PLAY_BASE=http://192.168.1.49:8081

      # NEW: HumanAnalyzer needs this checkpoint path INSIDE container
      - FAIRFACE_CKPT=/app/models/fairface_alldata_4race_20191111.pt

      # NEW: where uploads should be stored INSIDE container
      - DRONE_UPLOAD_DIR=/app/uploads

      # Optional (if your security module uses it)
      # - X_API_KEY=your_key_here
      # or whatever your intruder-server reads

    volumes:
      # Mount local folders into container
      - ./models:/app/models
      - ./uploads:/app/uploads

    depends_on:
      - srs

  srs:
    image: ossrs/srs:6
    container_name: srs
    ports:
      - "1935:1935" # RTMP ingest
      - "1985:1985" # SRS API
      - "8081:8080" # SRS HTTP (mapped to 8081)
    command: ["./objs/srs", "-c", "conf/rtmp.conf"]